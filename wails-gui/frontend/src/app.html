<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wails GUI App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00d9ff;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #b0b0b0;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #00d9ff;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            width: 100%;
            max-width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }
        
        input[type="text"]::placeholder {
            color: #888;
        }
        
        button {
            padding: 12px 30px;
            font-size: 1rem;
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border-left: 4px solid #00d9ff;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .info {
            margin-top: 40px;
            padding: 15px;
            background: rgba(0, 217, 255, 0.1);
            border-radius: 8px;
            font-size: 0.9rem;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Wails GUI App</h1>
        <p>Enter your name to get a personalized greeting from Go backend!</p>
        
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Enter your name...">
        </div>
        
        <button onclick="greet()">Get Greeting</button>
        <button onclick="getInfo()" style="margin-left: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">Get Info</button>
        
        <div class="result" id="result">
            <span style="color: #888;">Your greeting will appear here...</span>
        </div>
        
        <div class="info" id="info"></div>
    </div>

    <script>
        // Import the Go bindings
        const { main } = window.go.main;
        
        async function greet() {
            const nameInput = document.getElementById('nameInput');
            const resultDiv = document.getElementById('result');
            const name = nameInput.value.trim();
            
            if (!name) {
                resultDiv.innerHTML = '<span style="color: #ff6b6b;">Please enter a name!</span>';
                return;
            }
            
            try {
                resultDiv.innerHTML = '<span style="color: #00d9ff;">Loading...</span>';
                const greeting = await main.App.Greet(name);
                resultDiv.innerHTML = `<span style="color: #4ecdc4; font-size: 1.2rem;">${greeting}</span>`;
            } catch (error) {
                resultDiv.innerHTML = `<span style="color: #ff6b6b;">Error: ${error.message}</span>`;
            }
        }
        
        async function getInfo() {
            const infoDiv = document.getElementById('info');
            
            try {
                const info = await main.App.GetInfo();
                infoDiv.textContent = info;
            } catch (error) {
                infoDiv.innerHTML = `<span style="color: #ff6b6b;">Error: ${error.message}</span>`;
            }
        }
        
        // Allow Enter key to trigger greeting
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                greet();
            }
        });
    </script>
</body>
</html>
